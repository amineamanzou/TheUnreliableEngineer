name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/the-unreliable-engineer

jobs:
  build:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        run: echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            SITE_URL=https://theunreliable.engineer
            BASE_PATH=/
            VCS_REF=${{ github.sha }}

      - name: Release digest
        run: |
          echo "Published ${IMAGE_NAME}@${{ steps.build.outputs.digest }}"
          echo "Ansible deployment is intentionally gated until TheUnreliableInfrastructure accepts THE_UNRELIABLE_ENGINEER_IMAGE as an immutable digest."
