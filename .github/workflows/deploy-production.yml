name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-web-prod
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/the-unreliable-engineer

jobs:
  build:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ steps.release.outputs.image_ref }}
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Astro check
        run: npm run check

      - name: I18n content check
        run: npm run check:i18n

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        run: echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            SITE_URL=https://theunreliable.engineer
            BASE_PATH=/
            VCS_REF=${{ github.sha }}

      - name: Release digest
        id: release
        run: |
          echo "image_ref=${IMAGE_NAME}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "Published ${IMAGE_NAME}@${{ steps.build.outputs.digest }}"

  deploy:
    name: Deploy web-prod with Ansible
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout infrastructure
        uses: actions/checkout@v4
        with:
          repository: amineamanzou/TheUnreliableInfrastructure
          token: ${{ secrets.INFRA_WORKFLOW_TOKEN }}
          path: infra

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup sops
        uses: getsops/sops-action@v2

      - name: Install Ansible dependencies
        working-directory: infra
        run: |
          python -m venv .venv-ansible
          .venv-ansible/bin/pip install -r requirements-ansible.txt

      - name: Prepare SSH key
        env:
          WEB_PROD_SSH_PRIVATE_KEY: ${{ secrets.WEB_PROD_SSH_PRIVATE_KEY }}
        run: |
          test -n "$WEB_PROD_SSH_PRIVATE_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$WEB_PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy immutable release
        working-directory: infra
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          THE_UNRELIABLE_ENGINEER_IMAGE: ${{ needs.build.outputs.image_ref }}
          WEB_REGISTRY_USERNAME: ${{ secrets.GHCR_USERNAME }}
          WEB_REGISTRY_PASSWORD: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          test -n "$SOPS_AGE_KEY"
          test -n "$THE_UNRELIABLE_ENGINEER_IMAGE"
          test -n "$WEB_REGISTRY_USERNAME"
          test -n "$WEB_REGISTRY_PASSWORD"
          install -d -m 700 /tmp/ansible-home/.ansible/cp /tmp/ansible-local /tmp/ansible-remote
          umask 077
          python - <<'PY'
          import json
          import os

          release_vars = {
              "the_unreliable_engineer_image": os.environ["THE_UNRELIABLE_ENGINEER_IMAGE"],
              "web_registry_username": os.environ.get("WEB_REGISTRY_USERNAME", ""),
              "web_registry_password": os.environ.get("WEB_REGISTRY_PASSWORD", ""),
          }

          with open("/tmp/the-unreliable-engineer-release.json", "w", encoding="utf-8") as handle:
              json.dump(release_vars, handle)
          PY
          ANSIBLE_LOCAL_TEMP=/tmp/ansible-local \
          ANSIBLE_REMOTE_TEMP=/tmp/ansible-remote \
          ANSIBLE_HOME=/tmp/ansible-home \
          HOME=/tmp/ansible-home \
          .venv-ansible/bin/ansible-playbook \
            -i inventories/prod/hosts.yml \
            playbooks/web-prod.yml \
            -e @/tmp/the-unreliable-engineer-release.json
