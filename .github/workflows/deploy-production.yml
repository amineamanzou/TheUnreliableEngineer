name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-web-prod
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/the-unreliable-engineer
  LOCAL_IMAGE_TAG: the-unreliable-engineer:${{ github.sha }}

jobs:
  build:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    outputs:
      image: ${{ steps.release.outputs.image }}
      digest: ${{ steps.push.outputs.digest }}
      image_ref: ${{ steps.release.outputs.image_ref }}
    steps:
      - name: Checkout app
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Astro check
        run: npm run check

      - name: I18n content check
        run: npm run check:i18n

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker image metadata
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=raw,value=${{ github.sha }}
          labels: |
            org.opencontainers.image.title=The Unreliable Engineer
            org.opencontainers.image.description=Static Astro site runtime
            org.opencontainers.image.url=https://theunreliable.engineer

      - name: Build local image for scan
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.LOCAL_IMAGE_TAG }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            SITE_URL=https://theunreliable.engineer
            BASE_PATH=/
            VCS_REF=${{ github.sha }}

      - name: Trivy SARIF scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: MEDIUM,HIGH,CRITICAL
          vuln-type: os,library
          exit-code: "0"

      - name: Upload Trivy SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v7
        with:
          name: trivy-results
          path: trivy-results.sarif
          if-no-files-found: error

      - name: Trivy critical vulnerability gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE_TAG }}
          format: table
          severity: CRITICAL
          vuln-type: os,library
          exit-code: "1"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push signed release candidate
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          provenance: true
          sbom: true
          build-args: |
            SITE_URL=https://theunreliable.engineer
            BASE_PATH=/
            VCS_REF=${{ github.sha }}

      - name: Trivy pushed digest critical gate
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: table
          severity: CRITICAL
          vuln-type: os,library
          exit-code: "1"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign pushed digest
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: |
          test -n "${{ steps.push.outputs.digest }}"
          cosign sign --yes "$IMAGE_REF"

      - name: Verify pushed digest signature
        env:
          COSIGN_EXPERIMENTAL: "1"
          IMAGE_REF: ${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: |
          cosign verify "$IMAGE_REF" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            --certificate-identity-regexp="^https://github.com/${{ github.repository }}/\\.github/workflows/deploy-production\\.yml@refs/.+$"

      - name: Release digest
        id: release
        run: |
          test -n "${{ steps.push.outputs.digest }}"
          echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}@${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "Published signed digest ${IMAGE_NAME}@${{ steps.push.outputs.digest }}"

  deploy:
    name: Deploy web-prod with Ansible
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Validate signed image ref
        env:
          THE_UNRELIABLE_ENGINEER_IMAGE: ${{ needs.build.outputs.image_ref }}
        run: |
          test -n "$THE_UNRELIABLE_ENGINEER_IMAGE"

      - name: Checkout infrastructure
        uses: actions/checkout@v7
        with:
          repository: amineamanzou/TheUnreliableInfrastructure
          token: ${{ secrets.INFRA_WORKFLOW_TOKEN }}
          path: infra

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install SOPS
        uses: mdgreenwald/mozilla-sops-action@v2.1.0
        with:
          version: "v3.13.1"

      - name: Install Ansible dependencies
        working-directory: infra
        run: |
          python -m venv .venv-ansible
          .venv-ansible/bin/pip install -r requirements-ansible.txt

      - name: Prepare SSH key
        env:
          WEB_PROD_SSH_PRIVATE_KEY: ${{ secrets.WEB_PROD_SSH_PRIVATE_KEY }}
        run: |
          test -n "$WEB_PROD_SSH_PRIVATE_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$WEB_PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Preflight SSH reachability
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=15 \
            -o UserKnownHostsFile=/tmp/theunreliableinfra_known_hosts \
            -o StrictHostKeyChecking=accept-new \
            root@178.104.174.106 true
          ssh -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=15 \
            -o UserKnownHostsFile=/tmp/theunreliableinfra_known_hosts \
            -o StrictHostKeyChecking=accept-new \
            -o ProxyCommand="ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o ConnectTimeout=60 -o ServerAliveInterval=15 -o UserKnownHostsFile=/tmp/theunreliableinfra_known_hosts -o StrictHostKeyChecking=accept-new -W 10.42.1.30:22 root@178.104.174.106" \
            root@10.42.1.30 true

      - name: Deploy immutable release
        working-directory: infra
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          THE_UNRELIABLE_ENGINEER_IMAGE: ${{ needs.build.outputs.image_ref }}
          WEB_REGISTRY_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          WEB_REGISTRY_PASSWORD: ${{ secrets.GHCR_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          test -n "$SOPS_AGE_KEY"
          test -n "$THE_UNRELIABLE_ENGINEER_IMAGE"
          test -n "$WEB_REGISTRY_USERNAME"
          test -n "$WEB_REGISTRY_PASSWORD"
          install -d -m 700 /tmp/ansible-home/.ansible/cp /tmp/ansible-local /tmp/ansible-remote
          umask 077
          python - <<'PY'
          import json
          import os

          release_vars = {
              "the_unreliable_engineer_image": os.environ["THE_UNRELIABLE_ENGINEER_IMAGE"],
              "web_registry_username": os.environ.get("WEB_REGISTRY_USERNAME", ""),
              "web_registry_password": os.environ.get("WEB_REGISTRY_PASSWORD", ""),
          }

          with open("/tmp/the-unreliable-engineer-release.json", "w", encoding="utf-8") as handle:
              json.dump(release_vars, handle)
          PY
          ANSIBLE_LOCAL_TEMP=/tmp/ansible-local \
          ANSIBLE_REMOTE_TEMP=/tmp/ansible-remote \
          ANSIBLE_HOME=/tmp/ansible-home \
          ANSIBLE_TIMEOUT=60 \
          HOME=/tmp/ansible-home \
          .venv-ansible/bin/ansible-playbook \
            -i inventories/prod/hosts.yml \
            playbooks/web-prod.yml \
            -e @/tmp/the-unreliable-engineer-release.json
